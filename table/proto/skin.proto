syntax = "proto3";
package LOP.MasterData;
import "lop_options.proto";

message Skin {
  string code        = 1 [(lop.unique) = true, (lop.required) = true];
  string name        = 2 [(lop.required) = true];
  string description = 3 [(lop.side)    = "client"];
}

message SkinTable {
  repeated Skin entries = 1;
}
